name: Daily BSR Scrape

on:
  schedule:
    - cron: '0 14 * * *'  # 10am ET daily — shifted later to reduce captcha rate
  workflow_dispatch:  # allows manual trigger from GitHub UI

# The cloud is now the BACKUP scraper. The primary is a local job on the Mac
# mini that runs ~3am ET and pushes the day's data. So this workflow first
# checks whether today's data is already in the repo; if it is, every job below
# is skipped and the cloud does nothing. Only on days the Mac failed (no data
# yet) does the cloud run its captcha-fighting scrape + retries as a safety net.
#
# Each scrape job runs on its own fresh ubuntu-latest VM (= new IP from Azure's
# pool). If Amazon captcha-blocks the IP, the circuit breaker in src/scrape.py
# trips after ~15 min and the job exits non-zero, triggering the next retry.

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_data: ${{ steps.check.outputs.has_data }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check whether today's data already exists
        id: check
        run: |
          python - <<'PY'
          import datetime, os, sqlite3
          today = datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%d")
          n = 0
          try:
              conn = sqlite3.connect("bsr.db")
              n = conn.execute(
                  "SELECT COUNT(DISTINCT asin) FROM snapshots WHERE capture_date = ?",
                  (today,),
              ).fetchone()[0]
          except Exception as e:
              print("check error (treating as no data):", e)
          has = "true" if n > 0 else "false"
          print(f"{today}: {n} ASINs already have data -> has_data={has}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"has_data={has}\n")
          PY

  scrape:
    needs: check
    if: needs.check.outputs.has_data == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run scraper
        run: python -m src.scrape
        timeout-minutes: 180
        env:
          AMAZON_PROXY_URL: ${{ secrets.AMAZON_PROXY_URL }}
          AMAZON_PROXY_TOKEN: ${{ secrets.AMAZON_PROXY_TOKEN }}
      - name: Generate dashboard
        run: python -m src.dashboard
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bsr.db dashboard.html discovered_titles.txt
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily BSR update $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push

  retry1:
    needs: scrape
    if: needs.scrape.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      # Retries run direct (no proxy env) so each lands on a fresh Azure IP.
      # This restores IP diversity: when the CF Worker egress pool is captcha-
      # blocked (as on 2026-06-11), the retries draw from independent IPs.
      - name: Run scraper (retry 1)
        run: python -m src.scrape
        timeout-minutes: 180
      - name: Generate dashboard
        run: python -m src.dashboard
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bsr.db dashboard.html discovered_titles.txt
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily BSR update $(date -u +%Y-%m-%d) (retry 1)"
          git pull --rebase
          git push

  retry2:
    needs: retry1
    if: needs.retry1.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      # Retry runs direct (no proxy env) for a fresh Azure IP — see retry 1.
      - name: Run scraper (retry 2)
        run: python -m src.scrape
        timeout-minutes: 180
      - name: Generate dashboard
        run: python -m src.dashboard
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bsr.db dashboard.html discovered_titles.txt
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily BSR update $(date -u +%Y-%m-%d) (retry 2)"
          git pull --rebase
          git push

  retry3:
    needs: retry2
    if: needs.retry2.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      # Retry runs direct (no proxy env) for a fresh Azure IP — see retry 1.
      - name: Run scraper (retry 3)
        run: python -m src.scrape
        timeout-minutes: 180
      - name: Generate dashboard
        run: python -m src.dashboard
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bsr.db dashboard.html discovered_titles.txt
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily BSR update $(date -u +%Y-%m-%d) (retry 3)"
          git pull --rebase
          git push
